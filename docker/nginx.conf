user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    client_max_body_size 50M;

    # Security
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    server_tokens off;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=scrape:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # Upstreams
    upstream frontend { server frontend:3000; keepalive 32; }
    upstream backend  { server backend:8000;  keepalive 64; }
    upstream ollama   { server ollama:11434;  keepalive  8; }

    include /etc/nginx/conf.d/*.conf;
}
