service:
  host:      0.0.0.0
  http_port: 6333
  grpc_port: 6334
  max_request_size_mb: 32

storage:
  storage_path:     /qdrant/storage
  on_disk_payload:  true
  wal:
    wal_capacity_mb:    32
    wal_segments_ahead: 0
  performance:
    max_search_threads:      0   # auto-detect CPU count
    max_optimization_threads: 1

log_level: INFO

cluster:
  enabled: false
